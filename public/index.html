<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
</head>

<body>

    <h1>Rock Paper Scissors</h1>

    <div id="status">Waiting for player...</div>

    <button onclick="send('rock')">Rock</button>
    <button onclick="send('paper')">Paper</button>
    <button onclick="send('scissors')">Scissors</button>

    <h2 id="result"></h2>

    <script src="/socket.io/socket.io.js"></script>

    <script>

const socket = io()

socket.on("player",(n)=>{
 document.getElementById("status").innerText="You are Player "+n
})

socket.on("result",(data)=>{
 document.getElementById("result").innerText =
 `P1: ${data.p1} | P2: ${data.p2} | Winner: ${data.result}`
})

socket.on("full",()=>{
 document.body.innerHTML="Room full"
})

function send(choice){
 socket.emit("choice",choice)
}

    </script>

</body>
</html>
