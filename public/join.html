<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join Game - Mobile Controller</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="join-container">

    <div class="join-card">
        <h1>JOIN GAME</h1>
        <p style="color: #aaa; margin-bottom: 20px; font-size: 14px;">Enter your name</p>

        <input type="text" id="username" placeholder="Enter your name..." maxlength="12" autofocus>

        <button class="btn-primary" onclick="joinGame()">START PLAYING</button>

        <p style="margin-top: 15px; font-size: 12px; color: #666;">
            Mobile Controller Mode
        </p>
    </div>

    <script> 
        function joinGame() {
            const nameInput = document.getElementById('username');
            const name = nameInput.value.trim();

            if (name !== "") { 
                const encodedName = encodeURIComponent(name); 
                window.location.href = `controller.html?name=${encodedName}`;
            } else {
                alert("pls enter your name");
                nameInput.focus();
            }
        }
         
        document.getElementById('username').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                joinGame();
            }
        });
    </script>
</body>
</html>
