<!DOCTYPE html>
<html>
<head>

    <title>Controller</title>
    <link rel="stylesheet" href="style.css">

    <script src="/socket.io/socket.io.js"></script>

</head>

<body class="center">

    <h2 id="player"></h2>

    <div class="pad">

        <button class="btn" id="up">▲</button>

        <div>
            <button class="btn" id="left">◀</button>
            <button class="btn" id="right">▶</button>
        </div>

        <button class="btn" id="down">▼</button>

    </div>

    <script>

        const socket = io()

        const name = localStorage.getItem("playerName")

        document.getElementById("player").innerText = name

        socket.emit("join", { name })

        let moveInterval = null

        function startMove(dx, dy) {

            moveInterval = setInterval(() => {
                socket.emit("move", { dx, dy })
            }, 100)

        }

        function stopMove() {

            clearInterval(moveInterval)

        }

        function bind(id, dx, dy) {

            const el = document.getElementById(id)

            el.addEventListener("mousedown", () => startMove(dx, dy))
            el.addEventListener("mouseup", stopMove)

            el.addEventListener("touchstart", () => startMove(dx, dy))
            el.addEventListener("touchend", stopMove)

        }

        bind("up", 0, -5)
        bind("down", 0, 5)
        bind("left", -5, 0)
        bind("right", 5, 0)

    </script>

</body>
</html>
