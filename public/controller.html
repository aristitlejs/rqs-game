<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controller - ปุ่มควบคุม</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>

        #joystick-container {
            width: 100%;
            height: 300px; /* พื้นที่สำหรับโยก Joystick */
            position: relative;
            background: #222;
        }
    </style>
</head>
<body style="background: #111;">
    <div id="joystick-container"></div>

    <div id="chat_zone">
        <div class="chat-input-wrapper">
            <input type="text" id="chat_input" placeholder="พิมพ์ข้อความ...">
            <button class="btn-send" onclick="sendChat()">ส่ง</button>
        </div>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const playerName = urlParams.get('name') || 'Player';

        socket.emit('join_game', { name: playerName });

        // สร้าง Joystick
        const manager = nipplejs.create({
            zone: document.getElementById('joystick-container'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: 'white',
            size: 150
        });

        let lastEmitTime = 0;
        const emitInterval = 33; // ส่งข้อมูลทุกๆ 33ms (ประมาณ 30 FPS)

        // เมื่อมีการขยับ Joystick
        manager.on('move', (evt, data) => {
            const now = Date.now();
            if (now - lastEmitTime > emitInterval) {
                socket.emit('move', {
                    vx: data.vector.x,
                    vy: -data.vector.y
                });
                lastEmitTime = now;
            }
        });

        // เมื่อปล่อยมือ (หยุดเดิน)
        manager.on('end', () => {
            socket.emit('move', { vx: 0, vy: 0 });
        });

        function sendChat() {
            const input = document.getElementById('chat_input');
            const message = input.value.trim();

            if (message !== "") {
                socket.emit('send_chat', message); // ชื่อ Event ต้องตรงกับใน server.js
                input.value = ''; // พิมพ์เสร็จแล้วล้างช่องว่าง
            }
        }
    </script>
</body>
</html>
